apiVersion: apps/v1
kind: Deployment
metadata:
  name: tio-boot-web-hello
  namespace: default
  labels:
    app: tio-boot-web-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tio-boot-web-hello
  template:
    metadata:
      labels:
        app: tio-boot-web-hello
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      tolerations:
        - key: dedicated
          operator: Equal
          value: c4a
          effect: NoSchedule
      containers:
        - name: app
          image: us-central1-docker.pkg.dev/ambient-scope-486709-t4/tio-test/tio-boot-web-hello:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tio-boot-web-hello
  namespace: default
  labels:
    app: tio-boot-web-hello
spec:
  type: LoadBalancer
  selector:
    app: tio-boot-web-hello
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
